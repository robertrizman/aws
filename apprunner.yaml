version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  command: uvicorn app:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: TEALIUM_API_KEY
      value: ""          # ← set in App Runner console or via SSM/Secrets Manager
    - name: TEALIUM_ACCOUNT
      value: ""
    - name: TEALIUM_PROFILE
      value: ""
    - name: TEALIUM_ENGINE_ID
      value: ""
    - name: TEALIUM_ORIGIN
      value: "https://example.com"
    - name: TEALIUM_REFERER
      value: "https://example.com"
    - name: TEALIUM_MCP_URL
      value: "https://us-west-2.prod.developer.tealiumapis.com/v1/personalization/mcp"
