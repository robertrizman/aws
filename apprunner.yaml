version: 1.0
runtime: python311
build:
  commands:
    build:
      - echo "Build phase - source copied to /app"
run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: uvicorn app:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: TEALIUM_API_KEY
      value: ""          # ← set in App Runner console, not here
    - name: TEALIUM_ACCOUNT
      value: ""
    - name: TEALIUM_PROFILE
      value: ""
    - name: TEALIUM_ENGINE_ID
      value: ""
    - name: TEALIUM_ORIGIN
      value: "https://example.com"
    - name: TEALIUM_REFERER
      value: "https://example.com"
    - name: TEALIUM_MCP_URL
      value: "https://us-west-2.prod.developer.tealiumapis.com/v1/personalization/mcp"
